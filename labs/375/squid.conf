# =========================
# ACL DEFINITIONS
# =========================

acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443

acl CONNECT method CONNECT

# =========================
# ACCESS RULES
# =========================

# Deny unsafe ports
http_access deny !Safe_ports

# Block all HTTP (port 80)
acl HTTP_ports port 80
http_access deny HTTP_ports

# Allow HTTPS CONNECT only to 443
http_access deny CONNECT !SSL_ports

# Allow internal clients
http_access allow localnet

# Deny everything else
http_access deny all

# =========================
# BASIC SETTINGS
# =========================

http_port 3128
coredump_dir /var/spool/squid
logfile_rotate 0

# =========================
# CUSTOM ERROR PAGES
# =========================

# Point Squid at the directory containing your custom error templates.
# (Mount host folder: /root/squid-errors -> container: /usr/share/squid/errors)
error_directory /usr/share/squid/errors
